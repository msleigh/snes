<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>SNES verification plots</title>
    <style>
      :root {
        color-scheme: light;
        font-family: Helvetica, Arial, sans-serif;
      }
      body {
        margin: 0;
        padding: 2rem;
        background: #f6f7f8;
        color: #111;
      }
      main {
        max-width: 1200px;
        margin: 0 auto;
      }
      h1 {
        margin: 0 0 1.5rem;
      }
      .card {
        margin: 0 0 2rem;
        padding: 1rem;
        background: #fff;
        border: 1px solid #d9dde3;
        border-radius: 0.75rem;
        box-shadow: 0 0.25rem 0.75rem rgba(0, 0, 0, 0.06);
      }
      .card h2 {
        margin: 0 0 1rem;
        text-transform: capitalize;
      }
      .card img {
        display: block;
        width: 100%;
        height: auto;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>SNES verification plots</h1>
    <section class="card">
      <h2>keff results</h2>
      <img src="keff_results.png" alt="keff results">
    </section>
    <section class="card">
      <h2>test11 flux comparison</h2>
      <img src="test11_flux_comparison.png" alt="test11 flux comparison">
    </section>
    </main>
  </body>
</html>
